<!DOCTYPE html>
<html>
    <meta charset="UTF-8">
  <head>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background-image: url('tmnt/ew.jpeg');
            background-repeat: repeat;
            background-size: auto;
        }
        
        #loginForm {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgb(46, 85, 14);
            padding: 30px;
            border-radius: 0;
            text-align: center;
            z-index: 999999;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
        }
        
        #container {
            display: none;
            position: relative;
            z-index: 1;
            background-color: #073807;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #4CAF50;
            margin: 20px auto;
            max-width: 800px;
        }
        
        input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #44b929;
            color: rgb(6, 48, 11);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #dba724;
        }
        
        .error {
            color: red;
            margin-top: 10px;
        }
        .heart2 {
            align-self:center;
            position:absolute;
            top:500px;
            transform-origin:center;
            transform:scale(2);
            left:600px;
        }
    </style>
</head>
<body>
    <div id="loginForm">
        <h2>Ta stran je samo za slavljenko :)</h2>
        <p>če si Indija vtipkaj geslo:</p>
        <form id="passwordForm">
            <input type="password" id="passwordInput" placeholder="Enter Password" required>
            <br>
            <button type="button" onclick="validatePassword()">Access Content</button>
        </form>
        <div id="errorMsg" class="error"></div>
     <button onclick="logout()">Logout</button>
    </div>
    <img src="gifiinslikce/heart3.png" class="heart2" alt="heart image">
    <script>
        const correctPassword = "1";
        
        function validatePassword() {
            const inputPassword = document.getElementById("passwordInput").value;
            const errorMsg = document.getElementById("errorMsg");
            
            if (inputPassword === correctPassword) {
                document.getElementById("loginForm").style.display = "none";
                errorMsg.textContent = "";
            } else {
                errorMsg.textContent = "Incorrect password! Please try again.";
                document.getElementById("passwordInput").value = "";
                document.getElementById("passwordInput").focus();
            }
        }
        
        function logout() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("passwordInput").value = "";
        }
        
        // Allow Enter key to submit
        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                validatePassword();
            }
        });
    </script>
</body>
</html>
